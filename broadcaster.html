<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Amazon IVS 配信ページ（安定版マイク切替）</title>

  <!-- Amazon IVS Web Broadcast SDK -->
  <script src="https://web-broadcast.live-video.net/1.32.0/amazon-ivs-web-broadcast.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 12px;
    }

    p {
      color: #cbd5e1;
      margin: 0 0 12px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      font-size: 16px;
    }

    button {
      background: #2563eb;
      border: none;
      margin-top: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button.stop {
      background: #dc2626;
    }

    button.mic-on {
      background: #16a34a;
    }

    button.mic-off {
      background: #7f1d1d;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 14px;
      margin-top: 16px;
      border: 1px solid #334155;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      color: #93c5fd;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    .note {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 12px;
      line-height: 1.6;
    }

    .small {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Amazon IVS 配信ページ</h1>
    <p>
      iPhone Safari から Amazon IVS へ直接配信します。<br />
      マイクは初期状態では OFF です。必要な時だけ ON にしてください。
    </p>

    <label for="channelType">Channel Type</label>
    <select id="channelType">
      <option value="BASIC">BASIC</option>
      <option value="STANDARD">STANDARD</option>
    </select>

    <label for="ingestEndpoint">Ingest Endpoint / Ingest Server</label>
    <input
      id="ingestEndpoint"
      type="text"
      placeholder="例: abcdef.global-contribute.live-video.net"
    />

    <label for="streamKey">Stream Key</label>
    <input
      id="streamKey"
      type="password"
      placeholder="ストリームキーを貼り付け"
    />

    <div class="row">
      <button id="prepareBtn">カメラ準備</button>
      <button id="startBtn">配信開始</button>
    </div>

    <div class="row">
      <button id="toggleMicBtn" class="mic-off">マイクをONにする</button>
      <button id="stopBtn" class="stop">配信停止</button>
    </div>

    <div class="small" id="micStateText">現在のマイク状態: OFF</div>

    <canvas id="preview"></canvas>

    <div id="status" class="status">待機中</div>

    <div class="note">
      配信ページはモック用途です。<br />
      Stream Key を直接入力するため、公開範囲には注意してください。
    </div>
  </div>

  <script>
    const ingestInput = document.getElementById("ingestEndpoint");
    const streamKeyInput = document.getElementById("streamKey");
    const channelTypeSelect = document.getElementById("channelType");
    const prepareBtn = document.getElementById("prepareBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const toggleMicBtn = document.getElementById("toggleMicBtn");
    const previewEl = document.getElementById("preview");
    const statusEl = document.getElementById("status");
    const micStateTextEl = document.getElementById("micStateText");

    const VIDEO_DEVICE_NAME = "camera1";
    const AUDIO_DEVICE_NAME = "mic1";

    let client = null;
    let cameraStream = null;
    let micStream = null;

    let isPrepared = false;
    let isBroadcasting = false;
    let micEnabled = false;

    function setStatus(text) {
      statusEl.textContent = text;
      console.log(text);
    }

    function setMicUiState() {
      if (micEnabled) {
        toggleMicBtn.textContent = "マイクをOFFにする";
        toggleMicBtn.classList.remove("mic-off");
        toggleMicBtn.classList.add("mic-on");
        micStateTextEl.textContent = "現在のマイク状態: ON";
      } else {
        toggleMicBtn.textContent = "マイクをONにする";
        toggleMicBtn.classList.remove("mic-on");
        toggleMicBtn.classList.add("mic-off");
        micStateTextEl.textContent = "現在のマイク状態: OFF";
      }
    }

    function normalizeIngestEndpoint(value) {
      return value
        .trim()
        .replace(/^rtmps?:\/\//i, "")
        .replace(/^https?:\/\//i, "")
        .replace(/\/.*$/i, "")
        .replace(/:\d+$/i, "");
    }

    function getStreamConfig() {
      const type = channelTypeSelect.value;
      if (type === "STANDARD") {
        return IVSBroadcastClient.STANDARD_PORTRAIT;
      }
      return IVSBroadcastClient.BASIC_PORTRAIT;
    }

    function stopTracksOfStream(stream) {
      if (!stream) return;
      for (const track of stream.getTracks()) {
        track.stop();
      }
    }

    function resetClientOnlyFlags() {
      isPrepared = false;
      isBroadcasting = false;
      micEnabled = false;
      setMicUiState();
    }

    function cleanupAllMedia() {
      stopTracksOfStream(cameraStream);
      stopTracksOfStream(micStream);
      cameraStream = null;
      micStream = null;
      resetClientOnlyFlags();
    }

    function createClient() {
      const ingestEndpoint = normalizeIngestEndpoint(ingestInput.value);

      if (!ingestEndpoint) {
        throw new Error("Ingest Endpoint を入力してください。");
      }

      client = IVSBroadcastClient.create({
        streamConfig: getStreamConfig(),
        ingestEndpoint
      });

      client.attachPreview(previewEl);
      return client;
    }

    async function prepareCamera() {
      try {
        setStatus("カメラを準備しています...");

        const ingestEndpoint = normalizeIngestEndpoint(ingestInput.value);
        if (!ingestEndpoint) {
          setStatus("Ingest Endpoint を入力してください。");
          return;
        }

        if (isBroadcasting) {
          setStatus("配信中は再準備できません。いったん配信停止してください。");
          return;
        }

        cleanupAllMedia();
        client = createClient();

        const streamConfig = getStreamConfig();

        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: streamConfig.maxResolution.width },
            height: { ideal: streamConfig.maxResolution.height }
          },
          audio: false
        });

        client.addVideoInputDevice(cameraStream, VIDEO_DEVICE_NAME, { index: 0 });

        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: false
          });
          micEnabled = false;
          setMicUiState();
          setStatus("カメラ準備完了。プレビューが見えていればOKです。マイクは現在OFFです。");
        } catch (audioError) {
          micStream = null;
          micEnabled = false;
          setMicUiState();
          setStatus(
            "カメラ準備完了。マイク権限は未取得または拒否されています。\n" +
            "映像だけで配信できます。"
          );
          console.warn("Microphone permission/setup failed:", audioError);
        }

        isPrepared = true;
      } catch (err) {
        console.error(err);
        setStatus("カメラ準備に失敗しました: " + (err.message || err));
      }
    }

    async function startBroadcast() {
      try {
        const streamKey = streamKeyInput.value.trim();

        if (!streamKey) {
          setStatus("Stream Key を入力してください。");
          return;
        }

        if (!client || !isPrepared) {
          setStatus("先に「カメラ準備」を押してください。");
          return;
        }

        if (isBroadcasting) {
          setStatus("すでに配信中です。");
          return;
        }

        setStatus("配信開始中...");
        await client.startBroadcast(streamKey);
        isBroadcasting = true;
        setStatus(
          "配信開始しました。\n" +
          "PC側の視聴ページまたは Amazon IVS コンソールで確認してください。"
        );
      } catch (err) {
        console.error(err);
        setStatus("配信開始に失敗しました: " + (err.message || err));
      }
    }

    function stopBroadcast() {
      try {
        if (!client) {
          setStatus("配信クライアントがまだ作成されていません。");
          return;
        }

        client.stopBroadcast();
        isBroadcasting = false;
        setStatus("配信を停止しました。");
      } catch (err) {
        console.error(err);
        setStatus("配信停止でエラー: " + (err.message || err));
      }
    }

    async function turnMicOn() {
      if (!client || !isPrepared) {
        setStatus("先に「カメラ準備」を押してください。");
        return;
      }

      if (micEnabled) {
        setStatus("マイクはすでにONです。");
        return;
      }

      try {
        if (!micStream) {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: false
          });
        }

        try {
          client.removeAudioInputDevice(AUDIO_DEVICE_NAME);
        } catch (_) {
          // まだ未登録なら無視
        }

        client.addAudioInputDevice(micStream, AUDIO_DEVICE_NAME);
        micEnabled = true;
        setMicUiState();
        setStatus("マイクをONにしました。");
      } catch (err) {
        console.error(err);
        setStatus("マイクをONにできませんでした: " + (err.message || err));
      }
    }

    function turnMicOff() {
      if (!client || !isPrepared) {
        setStatus("先に「カメラ準備」を押してください。");
        return;
      }

      if (!micEnabled) {
        setStatus("マイクはすでにOFFです。");
        return;
      }

      try {
        client.removeAudioInputDevice(AUDIO_DEVICE_NAME);
      } catch (err) {
        console.warn("removeAudioInputDevice failed:", err);
      }

      stopTracksOfStream(micStream);
      micStream = null;

      micEnabled = false;
      setMicUiState();
      setStatus("マイクをOFFにしました。");
    }

    async function toggleMic() {
      if (micEnabled) {
        turnMicOff();
      } else {
        await turnMicOn();
      }
    }

    prepareBtn.addEventListener("click", prepareCamera);
    startBtn.addEventListener("click", startBroadcast);
    stopBtn.addEventListener("click", stopBroadcast);
    toggleMicBtn.addEventListener("click", toggleMic);

    setMicUiState();
  </script>
</body>
</html>
